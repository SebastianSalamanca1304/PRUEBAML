version: "3.9"

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./chromadb:/app/chromadb
      - ./storage:/app/storage
    restart: unless-stopped